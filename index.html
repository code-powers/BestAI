<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best AI Customer Service Challenge</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f4ff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }
        .fade-in   { animation: fadeIn 0.35s ease both; }
        .pop       { animation: pop 0.25s ease; }
        .float     { animation: pulse-soft 2.4s ease-in-out infinite; }

        .answer-btn {
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        }
        .answer-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        video { display: block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        /* ─── Data ─────────────────────────────────────────────── */
        const scenarios = [
            {
                id: "scenario_1",
                type: "video",
                title: "Helping a Customer",
                videoFile: "scenario1-helping-customer.mp4",
                videoDescription: "Employee ignoring a confused customer in the electronics section",
                scenarioText: "A customer approaches the electronics section looking confused. They clearly want help choosing a TV, but the associate continues stocking shelves without acknowledging them.",
                question: "What was the primary customer service issue?",
                answers: [
                    { text: "Lack of attentiveness",    correct: true,  feedback: "Exactly! Acknowledging customers immediately shows attentiveness. Even a quick 'I'll be right with you!' makes a huge difference." },
                    { text: "Incorrect product knowledge", correct: false, feedback: "The issue wasn't knowledge — the associate never even engaged with the customer to share any knowledge." },
                    { text: "Slow response time",       correct: false, feedback: "It's more than just slow — the associate completely ignored the customer's presence." },
                    { text: "No issue observed",        correct: false, feedback: "There's definitely an issue! Customers should be acknowledged promptly when they enter your area." }
                ],
                tip: "Acknowledge every customer within 10 seconds, even if you're busy!"
            },
            {
                id: "scenario_2",
                type: "video",
                title: "Explaining a Product",
                videoFile: "scenario2-explaining-product.mp4",
                videoDescription: "Employee listening and explaining tablet features",
                scenarioText: "A customer is interested in tablets but seems overwhelmed by the options. The associate listens carefully to their needs, asks clarifying questions, and explains features in simple terms.",
                question: "What made this interaction effective?",
                answers: [
                    { text: "Clear product knowledge",    correct: false, feedback: "Knowledge helped, but the key was HOW the associate used that knowledge — by listening first and tailoring the explanation." },
                    { text: "Empathy and active listening", correct: true,  feedback: "Perfect! The associate listened to understand the customer's actual needs, then explained accordingly. This builds trust and confidence." },
                    { text: "Offering a discount",        correct: false, feedback: "No discount was mentioned. Great service isn't about price — it's about understanding and helping." },
                    { text: "Quick transaction",          correct: false, feedback: "Speed isn't always better. Taking time to understand needs leads to better outcomes for everyone." }
                ],
                tip: "Listen first, then tailor your explanation to what the customer actually needs!"
            },
            {
                id: "scenario_3",
                type: "video",
                title: "Customer Complaint",
                videoFile: "scenario3-customer-complaint.mp4",
                videoDescription: "Associate dismissing a frustrated customer",
                scenarioText: "A customer returns to Best AI after one week with a Bluetooth speaker that is clearly broken. They seem frustrated. The associate immediately says, 'Sir, I can't help you. Our policy is clear.'",
                question: "What should the associate do differently?",
                answers: [
                    { text: "Listen and offer a solution",         correct: true,  feedback: "Exactly! Listen to understand the problem first, then work together to find a solution. This shows you care about their experience." },
                    { text: "Explain the return policy more firmly", correct: false, feedback: "Starting with policy creates conflict. Listen to the problem first, then explore options together." },
                    { text: "Ask for a receipt first",             correct: false, feedback: "While receipts help, addressing the customer's frustration and understanding the issue should come first." },
                    { text: "Call a manager immediately",          correct: false, feedback: "Try to help first! Many issues can be resolved without escalation if you listen and show you care." }
                ],
                tip: "When customers are upset, listen first — solutions come easier when they feel heard.",
                characterMessage: "When customers are upset, listen first — solutions come easier when they feel heard."
            },
            {
                id: "scenario_4",
                type: "video",
                title: "Warranty Upselling",
                videoFile: "scenario4-warranty-upselling.mp4",
                videoDescription: "Associate using pushy tactics to sell a warranty",
                scenarioText: "A customer just selected a laptop and is ready to purchase. The associate says, 'You NEED our extended warranty. Trust me, you'll regret not getting it. These laptops always break after a year.'",
                question: "What's the main problem with this approach?",
                answers: [
                    { text: "Being too pushy and fear-based",   correct: true,  feedback: "Correct! Scare tactics and pressure damage trust. Instead, explain warranty benefits and let customers decide what's right for them." },
                    { text: "Not explaining warranty details",  correct: false, feedback: "The bigger issue is the pushy, fear-based approach. Even with details, this method feels manipulative." },
                    { text: "Wrong timing in the sale",         correct: false, feedback: "Timing isn't the issue — it's the aggressive, fear-based approach that creates pressure instead of value." },
                    { text: "Warranty isn't needed",            correct: false, feedback: "Warranties can be valuable! The problem is HOW it's being presented — with pressure instead of helpful information." }
                ],
                tip: "Present options helpfully, not pressurefully. Trust builds sales better than fear.",
                characterMessage: "Present options helpfully, not pressurefully. Trust builds sales better than fear."
            },
            {
                id: "scenario_5",
                type: "video",
                title: "Tech Support",
                videoFile: "scenario5-tech-support.mp4",
                videoDescription: "Associate patiently teaching elderly customer to set up smart speaker",
                scenarioText: "An elderly customer is struggling to understand how to connect their new smart speaker to WiFi. The associate notices their confusion and says, 'Here, let me show you step-by-step. We can practice it together right here.'",
                question: "What makes this interaction successful?",
                answers: [
                    { text: "Patience and clear explanation",    correct: true,  feedback: "Perfect! Taking time to teach, not just sell, creates confident customers who return and recommend Best AI to others." },
                    { text: "Doing the setup for them",          correct: false, feedback: "The associate is teaching, not just doing it for them. This empowers the customer to succeed at home." },
                    { text: "Recommending an easier product",    correct: false, feedback: "The customer chose this product! Helping them succeed with their choice builds more confidence than switching products." },
                    { text: "Scheduling a home visit",           correct: false, feedback: "That's helpful but not necessary here. Teaching in-store empowers the customer immediately." }
                ],
                tip: "Patient teaching creates confident customers who become Best AI advocates!",
                characterMessage: "Patient teaching creates confident customers who become Best AI advocates!"
            }
        ];

        /* ─── Progress Bar ──────────────────────────────────────── */
        function ProgressBar({ current, total }) {
            const pct = Math.round((current / total) * 100);
            return React.createElement('div', { className: "w-full" },
                React.createElement('div', { className: "flex justify-between text-xs font-medium text-blue-200 mb-1" },
                    React.createElement('span', null, `Scenario ${current} of ${total}`),
                    React.createElement('span', null, `${pct}%`)
                ),
                React.createElement('div', { className: "h-2 bg-blue-800 rounded-full overflow-hidden" },
                    React.createElement('div', {
                        className: "h-full bg-white rounded-full transition-all duration-500",
                        style: { width: `${pct}%` }
                    })
                )
            );
        }

        /* ─── Score Badge ───────────────────────────────────────── */
        function ScoreBadge({ score, total }) {
            return React.createElement('div', { className: "flex items-center gap-1.5 bg-white/20 rounded-full px-3 py-1 text-white text-sm font-semibold" },
                React.createElement('span', null, "⭐"),
                React.createElement('span', null, `${score}/${total}`)
            );
        }

        /* ─── Main App ──────────────────────────────────────────── */
        function BestAIGame() {
            const [screen, setScreen]           = useState('welcome');
            const [idx, setIdx]                 = useState(0);
            const [score, setScore]             = useState(0);
            const [showFeedback, setShowFeedback] = useState(false);
            const [selected, setSelected]       = useState(null);

            const handleAnswer = (i) => {
                if (showFeedback) return;
                if (scenarios[idx].answers[i].correct) setScore(s => s + 1);
                setSelected(i);
                setShowFeedback(true);
            };

            const next = () => {
                if (idx < scenarios.length - 1) {
                    setIdx(i => i + 1);
                    setShowFeedback(false);
                    setSelected(null);
                } else {
                    setScreen('results');
                }
            };

            const restart = () => {
                setScreen('welcome');
                setIdx(0);
                setScore(0);
                setShowFeedback(false);
                setSelected(null);
            };

            const returnToStoryline = () => {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage('gameComplete', '*');
                } else {
                    alert('Challenge complete! Please continue in your course.');
                }
            };

            const getPerf = () => {
                const pct = Math.round((score / scenarios.length) * 100);
                if (pct >= 80) return { badge: "🏆 Best AI Legend",    color: "text-yellow-600", bg: "bg-yellow-50 border-yellow-300",  msg: "Your service skills drive customer loyalty! You understand that great service builds lasting relationships.", avatar: "🌟" };
                if (pct >= 60) return { badge: "💼 Trusted Sales Pro", color: "text-blue-700",   bg: "bg-blue-50 border-blue-300",      msg: "You're developing strong service instincts. Keep practicing for consistent 5-star service.", avatar: "💪" };
                return            { badge: "🌱 Rookie Associate",      color: "text-green-700",  bg: "bg-green-50 border-green-300",    msg: "You're on your way! Review these scenarios and remember: every customer interaction is a chance to create loyalty.", avatar: "📚" };
            };

            /* ── Welcome ── */
            if (screen === 'welcome') {
                return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-500 flex items-center justify-center p-4" },
                    React.createElement('div', { className: "bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in" },
                        React.createElement('div', { className: "text-center mb-6" },
                            React.createElement('div', { className: "inline-flex items-center justify-center w-14 h-14 bg-blue-100 rounded-2xl mb-4" },
                                React.createElement('span', { className: "text-3xl" }, "🏪")
                            ),
                            React.createElement('h1', { className: "text-2xl font-bold text-gray-900 mb-1" }, "Best AI"),
                            React.createElement('p', { className: "text-sm font-semibold text-blue-600 uppercase tracking-widest" }, "Customer Service Challenge")
                        ),
                        React.createElement('div', { className: "flex items-center gap-2 bg-blue-600/10 rounded-xl px-3 py-2 mb-4 border border-blue-200" },
                            React.createElement('span', { className: "text-base" }, "🔊"),
                            React.createElement('p', { className: "text-xs text-blue-700 font-medium" }, "Turn your sound on for the best experience")
                        ),
                        React.createElement('div', { className: "flex items-start gap-4 bg-blue-50 rounded-xl p-4 mb-6 border border-blue-100" },
                            React.createElement('img', { src: "./avatar.png", alt: "Instructor avatar", className: "w-16 h-16 rounded-full shrink-0 object-cover", style: {minWidth:"64px"} }),
                            React.createElement('p', { className: "text-sm text-gray-700 leading-relaxed" }, "Welcome to Best AI! Great service builds loyal customers. Can you spot the difference between good and bad service? Click below to begin your training!")
                        ),
                        React.createElement('div', { className: "grid grid-cols-3 gap-3 mb-6 text-center" },
                            ...[
                                ["🎬", "5 Scenarios"],
                                ["🎯", "Instant Feedback"],
                                ["🏆", "Earn a Badge"]
                            ].map(([icon, label]) =>
                                React.createElement('div', { key: label, className: "bg-gray-50 rounded-xl p-3" },
                                    React.createElement('div', { className: "text-xl mb-1" }, icon),
                                    React.createElement('p', { className: "text-xs font-medium text-gray-600" }, label)
                                )
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => setScreen('game'),
                            className: "w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-6 rounded-xl text-base transition-all shadow-md hover:shadow-lg"
                        }, "Start Challenge →")
                    )
                );
            }

            /* ── Results ── */
            if (screen === 'results') {
                const perf = getPerf();
                const pct  = Math.round((score / scenarios.length) * 100);
                return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-500 flex items-center justify-center p-4" },
                    React.createElement('div', { className: "bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in text-center" },
                        React.createElement('div', { className: "text-5xl mb-4" }, perf.avatar),
                        React.createElement('h1', { className: "text-xl font-bold text-gray-900 mb-1" }, "Challenge Complete!"),
                        React.createElement('p', { className: "text-sm text-gray-500 mb-6" }, "Here's how you did"),

                        React.createElement('div', { className: `rounded-xl p-5 border mb-6 ${perf.bg}` },
                            React.createElement('div', { className: "text-4xl font-extrabold text-gray-900 mb-1" }, `${score}/${scenarios.length}`),
                            React.createElement('div', { className: "text-xs text-gray-500 mb-3" }, `${pct}% correct`),
                            React.createElement('div', { className: `text-base font-bold mb-2 ${perf.color}` }, perf.badge),
                            React.createElement('p', { className: "text-sm text-gray-600 leading-relaxed" }, perf.msg)
                        ),

                        React.createElement('div', { className: "flex flex-col gap-2" },
                            React.createElement('button', { onClick: restart, className: "w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors" }, "🎯 Try Again"),
                            React.createElement('button', { onClick: returnToStoryline, className: "w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl text-sm transition-colors" }, "📚 Continue Course →")
                        )
                    )
                );
            }

            /* ── Game ── */
            const s = scenarios[idx];
            const isCorrect = selected !== null && s.answers[selected].correct;

            return React.createElement('div', { className: "min-h-screen bg-gradient-to-br from-blue-600 via-blue-500 to-indigo-500 flex items-center justify-center p-3" },
                React.createElement('div', { className: "w-full max-w-lg fade-in" },

                    /* Header bar */
                    React.createElement('div', { className: "flex items-center justify-between mb-3 px-1" },
                        React.createElement('div', { className: "text-white font-bold text-base" }, "Best AI"),
                        React.createElement('div', { className: "flex items-center gap-2" },
                            React.createElement('button', {
                                onClick: restart,
                                className: "text-white/80 hover:text-white text-xs font-medium bg-white/20 hover:bg-white/30 rounded-full px-3 py-1 transition-colors"
                            }, "↺ Restart"),
                            React.createElement(ScoreBadge, { score, total: scenarios.length })
                        )
                    ),

                    /* Progress */
                    React.createElement('div', { className: "mb-3 px-1" },
                        React.createElement(ProgressBar, { current: idx + 1, total: scenarios.length })
                    ),

                    /* Card */
                    React.createElement('div', { className: "bg-white rounded-2xl shadow-2xl overflow-hidden" },

                        /* Scenario header */
                        React.createElement('div', { className: "bg-blue-600 px-5 py-3" },
                            React.createElement('span', { className: "text-white font-semibold text-sm" }, `Scenario ${idx + 1}: ${s.title}`)
                        ),

                        React.createElement('div', { className: "p-4" },

                            /* PRE-ANSWER: show video + scenario text */
                            !showFeedback && React.createElement('div', { key: "pre-answer" },

                                /* Video — 16:9 aspect ratio container */
                                s.type === 'video' && React.createElement('div', {
                                    className: "rounded-xl overflow-hidden bg-gray-900 mb-3",
                                    style: { position: "relative", paddingTop: "56.25%" },
                                    key: `vid-${idx}`
                                },
                                    React.createElement('video', {
                                        controls: true,
                                        autoPlay: true,
                                        muted: true,
                                        style: { position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "contain", background: "#111" }
                                    },
                                        React.createElement('source', { src: `./videos/${s.videoFile}`, type: "video/mp4" }),
                                        React.createElement('div', { className: "text-white text-center p-4 text-sm", style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)" } },
                                            React.createElement('div', { className: "text-3xl mb-2" }, "🎥"),
                                            s.videoDescription
                                        )
                                    )
                                ),

                                /* Scenario text */
                                React.createElement('div', { className: "bg-blue-50 rounded-xl p-3 border-l-4 border-blue-500 mb-3" },
                                    React.createElement('p', { className: "text-xs text-gray-700 leading-relaxed" }, s.scenarioText)
                                ),

                                /* Character tip (text-only scenarios) */
                                s.characterMessage && React.createElement('div', { className: "flex items-start gap-2 bg-amber-50 rounded-xl p-3 border border-amber-200 mb-3" },
                                    React.createElement('span', { className: "text-xl shrink-0" }, "👩‍💼"),
                                    React.createElement('p', { className: "text-xs text-amber-800 leading-relaxed font-medium" }, s.characterMessage)
                                )
                            ),

                            /* Question — always visible */
                            React.createElement('p', { className: "text-sm font-bold text-gray-800 text-center mb-3" }, s.question),

                            /* Answers */
                            React.createElement('div', { className: "grid grid-cols-2 gap-2 mb-3" },
                                s.answers.map((a, i) => {
                                    let cls = "answer-btn p-3 text-left rounded-xl border-2 text-xs font-medium ";
                                    if (!showFeedback) {
                                        cls += "bg-white border-gray-200 text-gray-800 cursor-pointer";
                                    } else if (a.correct) {
                                        cls += "bg-green-50 border-green-500 text-green-800 cursor-not-allowed";
                                    } else if (selected === i) {
                                        cls += "bg-red-50 border-red-400 text-red-800 cursor-not-allowed";
                                    } else {
                                        cls += "bg-gray-50 border-gray-200 text-gray-400 cursor-not-allowed";
                                    }
                                    return React.createElement('button', {
                                        key: i,
                                        onClick: () => handleAnswer(i),
                                        disabled: showFeedback,
                                        className: cls
                                    },
                                        showFeedback && React.createElement('span', { className: "mr-1" }, a.correct ? "✅" : selected === i ? "❌" : ""),
                                        a.text
                                    );
                                })
                            ),

                            /* POST-ANSWER: feedback replaces video/scenario text */
                            showFeedback && React.createElement('div', { className: "fade-in" },
                                React.createElement('div', {
                                    className: `rounded-xl p-3 border mb-2 text-xs leading-relaxed ${
                                        isCorrect
                                            ? "bg-green-50 border-green-300 text-green-800"
                                            : "bg-orange-50 border-orange-300 text-orange-800"
                                    }`
                                },
                                    React.createElement('span', { className: "font-bold mr-1" }, isCorrect ? "✅ Correct!" : "Not quite —"),
                                    " ",
                                    s.answers[selected].feedback
                                ),

                                /* Tip */
                                React.createElement('div', { className: "flex items-start gap-2 bg-blue-50 rounded-xl p-3 border border-blue-100 mb-3" },
                                    React.createElement('span', { className: "text-base shrink-0" }, "💡"),
                                    React.createElement('p', { className: "text-xs text-blue-700 font-medium" }, s.tip)
                                ),

                                React.createElement('button', {
                                    onClick: next,
                                    className: "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors"
                                }, idx < scenarios.length - 1 ? "Next Scenario →" : "See My Results 🏆")
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.render(React.createElement(BestAIGame), document.getElementById('root'));
    </script>
</body>
</html>
